<!DOCTYPE html>
<html>
<head>
    <title>Find Artist</title>

    <style>
        body {
            background: linear-gradient(to right, #ff512f, #dd2476);
            color: white;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
        }

        button:hover {
            background-color: #333;
        }

        ul {
            list-style-type: none;
        }
    </style>
</head>

<body>

<h2>🎤 Find Tracks by Artist</h2>

<form method="POST">
    <input type="text" name="artist" placeholder="Enter artist name">
    <br><br>
    <button type="submit">Search</button>
</form>

{% if results %}
    <h3 class="mt-4">Results:</h3>
    <ul>
        {% for r in results %}
            <li>🎵 {{ r.Track }} — {{ r.Artist }}</li>
        {% endfor %}
    </ul>
{% endif %}

<br>
<a href="/">Back Home</a>

</body>
</html>
