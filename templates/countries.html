<!DOCTYPE html>
<html>
<head>
    <title>Countries</title>
</head>
<body>

<h2>Countries</h2>

<table border="1">
    <tr>
        <th>Name</th>
        <th>ISO Code</th>
    </tr>

    {% for c in countries %}
    <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.iso2 }}</td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/">Back Home</a>

</body>
</html>
