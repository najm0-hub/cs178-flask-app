<!DOCTYPE html>
<html lang="en">
<head>
    <title>Music Explorer</title>

    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #1db954, #191414);
            color: white;
            font-family: Arial, sans-serif;
        }

        h1 {
            font-weight: bold;
        }

        .btn-custom {
            background-color: #1db954;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background-color: #1ed760;
            transform: scale(1.05);
        }

        .icon {
            font-size: 40px;
            margin: 10px;
        }
    </style>
</head>

<body>

<div class="container text-center">

    <h1 class="mt-5">🎵 Music Explorer</h1>

    <i class="fas fa-music icon"></i>
    <i class="fas fa-headphones icon"></i>
    <i class="fas fa-compact-disc icon"></i>

    <p class="mt-3">Explore tracks, artists, and albums from your database.</p>

    <div class="mt-4">
        <a href="/tracks" class="btn btn-custom m-2">
            <i class="fas fa-list"></i> View Tracks
        </a>

        <a href="/search" class="btn btn-custom m-2">
            <i class="fas fa-search"></i> Search Tracks
        </a>

        <a href="/find" class="btn btn-custom m-2">
            <i class="fas fa-user"></i> Find by Artist
        </a>
    </div>

</div>

</body>
</html>
